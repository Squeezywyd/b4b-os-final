<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="50%" stop-color="#7DFFC0"/>
      <stop offset="100%" stop-color="#60CFFF"/>
    </linearGradient>
  </defs>

  <!-- Row 1: 40px full, 40px dim -->
  <rect x="0"  y="0"  width="40" height="18" rx="3" fill="url(#grad)" opacity="1"/>
  <rect x="44" y="0"  width="40" height="18" rx="3" fill="url(#grad)" opacity="0.4"/>

  <!-- Row 2: 22px half dim, 40px full -->
  <rect x="0"  y="22" width="22" height="18" rx="3" fill="url(#grad)" opacity="0.4"/>
  <rect x="26" y="22" width="40" height="18" rx="3" fill="url(#grad)" opacity="1"/>

  <!-- Row 3: 40px dim, 22px half -->
  <rect x="0"  y="44" width="40" height="18" rx="3" fill="url(#grad)" opacity="0.4"/>
  <rect x="44" y="44" width="22" height="18" rx="3" fill="url(#grad)" opacity="1"/>
</svg>
